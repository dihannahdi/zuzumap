# Apache vhost for map.nahdi.space  (aaPanel / Apache 2.4 on sonushub)
# Static frontend served from the docroot; /api reverse-proxied to the Kafilah
# binary on 127.0.0.1:8795. Mirrors the house pattern (see ngobrol.gladys.id).
#
# NOTE: the :443 block references a Let's Encrypt cert. Install the :80 block
# first, obtain the cert with certbot --webroot, THEN add :443 and reload.

<VirtualHost *:80>
    ServerAdmin webmaster@nahdi.space
    DocumentRoot "/www/wwwroot/map.nahdi.space"
    ServerName map.nahdi.space
    ErrorLog "/www/wwwlogs/map.nahdi.space-error_log"
    CustomLog "/www/wwwlogs/map.nahdi.space-access_log" combined

    # Keep the ACME webroot reachable over HTTP for issuance + renewals;
    # redirect everything else to HTTPS.
    <IfModule mod_rewrite.c>
        RewriteEngine on
        RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
        RewriteCond %{SERVER_PORT} !^443$
        RewriteRule (.*) https://%{SERVER_NAME}$1 [L,R=301]
    </IfModule>

    <Directory "/www/wwwroot/map.nahdi.space">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin webmaster@nahdi.space
    DocumentRoot "/www/wwwroot/map.nahdi.space"
    ServerName map.nahdi.space
    ErrorLog "/www/wwwlogs/map.nahdi.space-error_log"
    CustomLog "/www/wwwlogs/map.nahdi.space-access_log" combined

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/map.nahdi.space/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/map.nahdi.space/privkey.pem
    SSLProtocol All -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder On
    Protocols http/1.1

    ProxyPreserveHost On
    SetEnv proxy-sendcl 1
    ProxyPass /api http://127.0.0.1:8795/api flushpackets=on disablereuse=on
    ProxyPassReverse /api http://127.0.0.1:8795/api

    # Cache policy: HTML/manifest/SW must revalidate; hashed vendor libs cache long.
    <IfModule mod_headers.c>
        <FilesMatch "\.(html|webmanifest)$">
            Header set Cache-Control "no-cache"
        </FilesMatch>
        <FilesMatch "sw\.js$">
            Header set Cache-Control "no-cache"
        </FilesMatch>
        <LocationMatch "^/vendor/">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </LocationMatch>
    </IfModule>

    #DENY FILES
    <Files ~ (\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)$>
        Require all denied
    </Files>

    <Directory "/www/wwwroot/map.nahdi.space">
        SetOutputFilter DEFLATE
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html
    </Directory>
</VirtualHost>
